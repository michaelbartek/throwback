<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ďakujem!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #8c82b6;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.3rem;
            opacity: 0.9;
            margin-bottom: 50px;
            font-weight: 400;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            font-size: 1.5rem;
            padding: 15px 45px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s ease, background-color 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
        }

        .btn-finish {
            background-color: #a63e3e; 
            color: white;
        }

        .btn-finish:hover {
            background-color: #8c3232;
            transform: scale(1.05);
        }

        .top-image {
            max-width: 150px; 
            height: auto;
            margin-bottom: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        /* Čierna obrazovka pre lokálne video */
        .video-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 9999;
        }

        .video-screen video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Video sa pekne prispôsobí obrazovke bez orezania */
        }
    </style>
</head>
<body>

    <!-- 1. KROK: Fialový web -->
    <div class="container" id="textWeb">
        <img src="img/obrazok.png" alt="Chill ilustrácia" class="top-image">
        <h1>ĎAKUJEM, VIDÍME SA NA MIESTE!</h1>
        <p class="subtitle">
            PS. normal people text, i made a website durning lunch for you. no big deal. Okopiroval som to z IG
        </p>
        <div>
            <button class="btn btn-finish" onclick="transformujWeb()">SKONČIŤ</button>
        </div>
    </div>

    <!-- 2. KROK: Nový web s čistým lokálnym videom bez reklám a bez YouTube -->
    <div class="video-screen" id="videoWeb">
        <video id="localPlayer" src="video.mp4" playsinline></video>
    </div>

    <script>
        function transformujWeb() {
            document.body.style.backgroundColor = "#000000";
            document.getElementById('textWeb').style.display = 'none';
            
            const videoWeb = document.getElementById('videoWeb');
            videoWeb.style.display = 'block';
            
            const player = document.getElementById('localPlayer');
            
            // Spustíme lokálne stiahnuté video
            player.play().catch(function(error) {
                // Ak by náhodou prehliadač blokoval zvuk, pridáme ovládacie prvky, aby si ho mohla spustiť ručne
                player.controls = true;
                console.log("Autoplay zablokovaný, pridané controls: ", error);
            });
        }
    </script>

</body>
</html>
