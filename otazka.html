<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHCEŠ POCHILLOVAŤ VONKU?</title>
   <style>
        /* Reset a základné nastavenie pre Full HD bez scrollovania */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Odstráni otravný modrý záblesk pri klikaní na mobile */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Zakáže scrollovanie */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #8c82b6; /* Fialové pozadie */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hlavný kontajner vycentrovaný na stred */
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        /* Flexbox pre tlačidlá */
        .buttons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px; /* Medzera medzi tlačidlami */
            position: relative;
            width: 100%;
            height: 80px; 
        }

        /* Spoločný štýl pre tlačidlá */
        .btn {
            font-size: 1.5rem;
            padding: 15px 45px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s ease, background-color 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            user-select: none; /* Zabráni označovaniu textu pri rýchlom klikaní */
        }

        /* Tlačidlo ÁNO */
        .btn-yes {
            background-color: #f3a657; 
            color: white;
        }

        .btn-yes:hover {
            background-color: #e29546;
            transform: scale(1.05);
        }

        /* Tlačidlo NIE */
        .btn-no {
            background-color: #a63e3e; 
            color: white;
            transition: transform 0.2s ease, background-color 0.2s ease, left 0.1s ease, top 0.1s ease;
        }

        /* Štýl pre malý obrázok nad nadpisom */
        .top-image {
            max-width: 150px; 
            height: auto;
            margin-bottom: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        /* RESPONZIVITA PRE MOBILY (Displeje menšie ako 600px) */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem; /* Zmenšíme písmo, aby sa nadpis na mobile zmestil */
                margin-bottom: 30px;
                padding: 0 10px;
            }

            .buttons-wrapper {
                gap: 20px; /* Zmenšíme medzeru, aby gombíky neboli nalepené na okrajoch */
            }

            .btn {
                font-size: 1.2rem; /* Jemne menšie gombíky pre lepšiu manipuláciu */
                padding: 12px 30px;
                min-width: 110px;
            }

            .top-image {
                max-width: 110px; /* Menší obrázok, nech to na mobile pekne ukáže */
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

   <div class="container">
        <img src="img/obrazok.png" alt="Chill ilustrácia" class="top-image">

        <h1>CHCEŠ POCHILLOVAŤ VONKU?☀️</h1>
        
        <div class="buttons-wrapper">
            <a href="ano.html" class="btn btn-yes">ÁNO👍</a>
            
            <button class="btn btn-no" id="noBtn">NIE👎</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        function moveButton() {
            // Odsadenie (padding) od krajov obrazovky, aby gombík neskočil pod zárez displeja alebo úplne na okraj
            const padding = 20; 
            
            // Výpočet maximálnej možnej pozície s ohľadom na bezpečnú zónu
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // Vygenerovanie náhodnej pozície (od bezpečného okraja po maximálny limit)
            let randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            let randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            // Kontrola: Ak by vygenerované súradnice boli príliš blízko 0 (mimo zorného uhla), posunieme ich do bezpečia
            if (randomX < padding) randomX = padding;
            if (randomY < padding) randomY = padding;

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Aktivuje sa na PC pri priblížení myšou
        noBtn.addEventListener('mouseenter', moveButton);
        
        // Na mobile: Okamžite pri prvom dotyku (ešte pred kliknutím) tlačidlo odskočí
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Zruší štandardné kliknutie a focus
            moveButton();
        });
    </script>

</body>
</html>
