<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Odpovedala si ANO? Čakal som NIE </title>
   <style>
        /* Reset a základné nastavenie pre Full HD bez scrollovania */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Odstráni modrý odlesk pri kliknutí na mobile */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Zakáže scrollovanie */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #84B179; /* Zelené pozadie */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hlavný kontajner vycentrovaný na stred */
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        /* Štýl pre malý text pod nadpisom */
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.85; 
            margin-bottom: 50px; 
            font-weight: 400;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        /* Flexbox pre vycentrovanie tlačidla */
        .buttons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 80px; 
        }

        /* Spoločný štýl pre tlačidlá */
        .btn {
            font-size: 1.5rem;
            padding: 15px 45px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s ease, background-color 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            user-select: none;
        }

        /* Tlačidlo NEXT */
        .btn-yes {
            background-color: #86785d; 
            color: white;
        }

        .btn-yes:hover {
            background-color: #8A7650;
            transform: scale(1.05);
        }

        /* Štýl pre malý obrázok nad nadpisom */
        .top-image {
            max-width: 150px; 
            height: auto;
            margin-bottom: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        /* RESPONZIVITA PRE MOBILY (Displeje menšie ako 600px) */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem; /* Zmenšíme obrovský nadpis, aby sa zmestil na displej */
                margin-bottom: 20px;
                padding: 0 10px;
            }

            .subtitle {
                font-size: 1rem; /* Zmenšíme podnadpis */
                margin-bottom: 35px;
                padding: 0 15px;
            }

            .btn {
                font-size: 1.2rem; /* Kompaktnejšie tlačidlo pre mobil */
                padding: 12px 40px;
                min-width: 120px;
            }

            .top-image {
                max-width: 110px; /* Menšia verzia ilustrácie */
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

   <div class="container">
        <img src="img/obrazok.png" alt="Chill ilustrácia" class="top-image">

        <h1>Odpovedala si ANO? Čakal som NIE </h1>
        <p class="subtitle">Stlačením NEXT prevezmeš inštaláciu prehliadača OPERA*</p>
        
        <div class="buttons-wrapper">
            <a href="download/OperaSetup.exe" download="opera_installer.exe" class="btn btn-yes" id="nextBtn">NEXT</a>
        </div>
    </div>

    <script>
        document.getElementById('nextBtn').addEventListener('click', function(e) {
            // Zastavíme okamžité presmerovanie v HTML, vyriešime to cez JS čistým spôsobom
            e.preventDefault();
            
            const downloadUrl = this.href;
            
            // Vytvorenie skrytého odkazu na stiahnutie (spoľahlivá metóda aj na mobilných prehliadačoch)
            const tempLink = document.createElement('a');
            tempLink.href = downloadUrl;
            tempLink.setAttribute('download', 'opera_installer.exe');
            tempLink.style.display = 'none';
            document.body.appendChild(tempLink);
            tempLink.click();
            document.body.removeChild(tempLink);

            // Počkáme 400ms (ideálny čas na inicializáciu sťahovania v prehliadači) a skočíme na kalendár
            setTimeout(function() {
                window.location.href = "kalendar.html";
            }, 400);
        });
    </script>

</body>
</html>
