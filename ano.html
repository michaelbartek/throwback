<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odpovedala si ANO? Čakal som NIE </title>
   <style>
        /* Reset a základné nastavenie pre Full HD bez scrollovania */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Zakáže scrollovanie */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #84B179; /* Fialové pozadie z tvojho screenshotu */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hlavný kontajner vycentrovaný na stred */
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        /* Flexbox pre dokonalé vycentrovanie tlačidiel vedľa seba */
        .buttons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px; /* Medzera medzi tlačidlami */
            position: relative;
            width: 100%;
            height: 80px; /* Fixná výška obalu, aby stránka neskakala */
        }

        /* Spoločný štýl pre tlačidlá */
        .btn {
            font-size: 1.5rem;
            padding: 15px 45px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s ease, background-color 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
        }
        /* Štýl pre malý text pod nadpisom */
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.85; /* Jemne priesvitný pre lepší vizuálny kontrast */
            margin-bottom: 50px; /* Medzera medzi textom a tlačidlami */
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Tlačidlo ÁNO - Oranžovo/žlté z tvojho screenshotu */
        .btn-yes {
            background-color: #86785d; 
            color: white;
        }

        .btn-yes:hover {
            background-color: #8A7650;
            transform: scale(1.05);
        }

        /* Tlačidlo NIE - Bordovo/červené */
        .btn-no {
            background-color: #a63e3e; 
            color: white;
            /* Premenné pre hladší JS prechod (voliteľné) */
            transition: transform 0.2s ease, background-color 0.2s ease, left 0.1s ease, top 0.1s ease;
        }
        /* Štýl pre tvoj malý obrázok nad nadpisom */
        .top-image {
            max-width: 150px; /* Maximálna šírka obrázka (uprav podľa potreby) */
            height: auto;
            margin-bottom: 20px; /* Medzera medzi obrázkom a nadpisom */
            border-radius: 12px; /* Jemné zaoblenie rohov obrázka */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); /* Jemný tieň */
        }
    </style>
</head>
<body>

   <div class="container">
        <img src="img/obrazok.png" alt="Chill ilustrácia" class="top-image">

        <h1>Odpovedala si ANO? Čakal som NIE </h1>
        <p class="subtitle">Stlačenim NEXT, prevezmeš inštalaciu prehliadača OPERA*</p>
        
  <div class="buttons-wrapper">
            <a href="download/OperaSetup.exe" download="opera_installer.exe" class="btn btn-yes" id="nextBtn">NEXT</a>
        </div>
    </div>

    <script>
        document.getElementById('nextBtn').addEventListener('click', function(e) {
            // Zastavíme okamžité otvorenie odkazu, aby stihlo začať sťahovanie
            e.preventDefault();
            
            // Získame cieľ pre sťahovanie (download link)
            const downloadUrl = this.href;
            
            // Vytvoríme skrytý odkaz, ktorý spustí sťahovanie na pozadí
            const tempLink = document.createElement('a');
            tempLink.href = downloadUrl;
            tempLink.setAttribute('download', 'opera_installer.exe');
            document.body.appendChild(tempLink);
            tempLink.click();
            document.body.removeChild(tempLink);

            // Počkáme 300ms a potom presmerujeme používateľa na podstránku ano.html
            setTimeout(function() {
                window.location.href = "kalendar.html";
            }, 300);
        });
    </script>
